server.port=8080

spring.datasource.url=jdbc:sqlite:./data/redmine.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.hikari.connection-init-sql=PRAGMA foreign_keys=ON
spring.datasource.hikari.maximum-pool-size=1

spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

app.jwt.secret=${REDMINE_JWT_SECRET:redmine-clone-dev-secret-key-please-change-32bytes-minimum}
app.jwt.expiration-ms=86400000
